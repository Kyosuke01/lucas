services:
  ollama:
    image: ollama/ollama:latest
    container_name: lucas-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD-SHELL", "ollama list || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: lucas-open-webui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://${OLLAMA_HOST:-ollama}:${OLLAMA_PORT:-11434}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-false}
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL:-admin@lucas.local}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD}
      WEBUI_ADMIN_NAME: ${WEBUI_ADMIN_NAME:-Admin}
      WEBUI_NAME: "LUCAS"
      WEBUI_URL: "http://localhost:8080"
      ENABLE_LOGIN_FORM: "true"
      SHOW_ADMIN_DETAILS: "false"
      DEFAULT_LOCALE: "fr"
    ports:
      - "${OPEN_WEBUI_PORT:-8080}:8080"
    volumes:
      - webui_data:/app/backend/data

  lucas-core:
    build:
      context: ./lucas-core
      dockerfile: Dockerfile
    container_name: lucas-core
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      LUCAS_ENV: ${LUCAS_ENV:-development}
      LUCAS_LOG_LEVEL: ${LUCAS_LOG_LEVEL:-INFO}
      OLLAMA_BASE_URL: http://${OLLAMA_HOST:-ollama}:${OLLAMA_PORT:-11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.1:8b}
      LUCAS_ACTION_CONFIRM: ${LUCAS_ACTION_CONFIRM:-true}
      LUCAS_ACTION_WHITELIST: ${LUCAS_ACTION_WHITELIST:-true}
    ports:
      - "8000:8000"
    volumes:
      - lucas_logs:/app/logs
      - lucas_config:/app/config

volumes:
  ollama_data:
  webui_data:
  lucas_logs:
  lucas_config:
